<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — DRW Prime</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at 12% 18%, rgba(212, 175, 55, 0.16), transparent 40%),
          #050505;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      img { width: 150px; height: auto; margin: 0 auto 28px; display: block; }
      .icon {
        width: 64px; height: 64px; margin: 0 auto 20px;
        border-radius: 9999px;
        border: 1px solid rgba(212, 175, 55, 0.4);
        background: rgba(212, 175, 55, 0.12);
        display: flex; align-items: center; justify-content: center;
      }
      h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
      p { font-size: 14px; color: rgba(255, 255, 255, 0.6); line-height: 1.6; margin-bottom: 28px; }
      button {
        background: #d4af37; color: #000; border: 0;
        font-weight: 700; font-size: 14px;
        padding: 12px 28px; border-radius: 10px; cursor: pointer;
        transition: opacity 0.2s ease;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/drwprime-logo.png" alt="DRW Prime" />
      <div class="icon">
        <svg width="30" height="30" fill="none" stroke="#d4af37" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m-12.728 0a9 9 0 010-12.728m9.9 2.829a5 5 0 010 7.07m-7.07 0a5 5 0 010-7.07M12 12h.01" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
        </svg>
      </div>
      <h1>Anda Sedang Offline</h1>
      <p>Sepertinya koneksi internet Anda terputus. Periksa koneksi lalu coba lagi untuk mengakses DRW Prime.</p>
      <button onclick="location.reload()">Coba Lagi</button>
    </div>
  </body>
</html>
